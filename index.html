<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Skilaverkefni 2</title>
  </head>
  <body>
    <header class="header">
      <h1>VERKEFNALISTI / TODO LIST</h1>

      <form id="taskForm">
        <input
          id="taskInput"
          type="text"
          placeholder="Skrifaðu nýtt verkefni...."
          required
        />
        <button type="submit">BÆTA VIÐ</button>
      </form>
    </header>

    <main class="task-section">
      <h2>LISTI AF VERKEFNUM</h2>

      <ul id="taskList"></ul>

      <div class="stats">
        <p>Heildarfjöldi: <span id="totalCount">0</span></p>
        <p>Lokin Verkefni: <span id="doneCount">0</span></p>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 Skilaverkefni 2</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
